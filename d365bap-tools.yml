trigger: none

pool:
  vmImage: 'windows-latest'

variables:
- group: MySecureVariables

steps:

# 1. Install required modules
- task: PowerShell@2
  displayName: 'Install Az + d365bap.tools'
  inputs:
    targetType: 'inline'
    pwsh: true
    script: |
      Install-Module Az.Accounts -Force -Scope CurrentUser
      Install-Module d365bap.tools -Force -Scope CurrentUser

# 2. Authenticate using Service Principal + list F&O environments
- task: PowerShell@2
  displayName: 'List F&O environments (Service Principal)'
  inputs:
    targetType: 'inline'
    pwsh: true
    script: |
      Import-Module Az.Accounts -Force
      Import-Module d365bap.tools -Force

      $tenantId = "$(TenantId)"
      $clientId = "$(ClientId)"
      $clientSecret = "$(ClientSecret)"

      $secPass = ConvertTo-SecureString $clientSecret -AsPlainText -Force
      $creds = [System.Management.Automation.PSCredential]::new($clientId, $secPass)

      Write-Host "Authenticating with Service Principal..."
      Connect-AzAccount -TenantId $tenantId -Credential $creds -ServicePrincipal

      Write-Host "Calling Get-BapEnvironment..."
      $all = Get-BapEnvironment

      # Correct filter for F&O environments
      $fno = $all | Where-Object { $_.FnOEnvUri -and $_.FnOEnvUri.Trim() -ne "" }

      Write-Host "=== F&O Environments (JSON) ==="
      $fno | ConvertTo-Json -Depth 10
      Write-Host "=== End of environment list ==="
